<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEBOOK - E-Library Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="app">
        <nav class="bg-emerald-600 text-white shadow-md">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <router-link to="/" class="text-2xl font-bold tracking-wider flex items-center gap-2">
                    📚 <span>JEBOOK</span>
                </router-link>
                <div class="flex items-center gap-4">
                    <router-link to="/" class="hover:text-emerald-200 transition">Beranda</router-link>
                    <router-link to="/rentals" class="hover:text-emerald-200 transition">Daftar Pinjam</router-link>
                    <router-link to="/dashboard" class="bg-emerald-700 px-4 py-2 rounded-lg text-sm hover:bg-emerald-800 transition">Panel Admin</router-link>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-6 py-8">
            <router-view></router-view>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api"; // Sesuaikan dengan URL hosting / lokal server CI4

        // --- GLOBAL AXIOS INTERCEPTORS ---
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response && error.response.status === 401) {
                    // PERBAIKAN: Jika error 401 dipicu saat submit login, biarkan ditangani oleh komponen Login.js
                    if (error.config.url.includes('/login')) {
                        return Promise.reject(error);
                    }
                    
                    // Hanya tendang dan reset jika terjadi kegagalan otentikasi data master data lain
                    alert("Sesi Anda berakhir atau Anda tidak memiliki akses admin! Menuju form login.");
                    localStorage.clear();
                    window.location.hash = "/login";
                }
                return Promise.reject(error);
            }
        );
    </script>

    <script src="./components/Home.js"></script>
    <script src="./components/Rentals.js"></script>
    <script src="./components/Login.js"></script>
    <script src="./components/Dashboard.js"></script>

    <script>
        // --- VUE ROUTER CONFIGURATION ---
        const routes = [
            { path: '/', component: Home },
            { path: '/rentals', component: Rentals },
            { path: '/login', component: Login },
            { path: '/dashboard', component: Dashboard, meta: { requiresAuth: true } }
        ];

        const router = VueRouter.createRouter({
            history: VueRouter.createWebHashHistory(),
            routes
        });

        // CLIENT-SIDE SECURITY (Navigation Guards)
        router.beforeEach((to, from, next) => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (to.meta.requiresAuth && !isLoggedIn) {
                next('/login');
            } else {
                next();
            }
        });

        const app = Vue.createApp({});
        app.use(router);
        app.mount('#app');
    </script>
</body>
</html>
